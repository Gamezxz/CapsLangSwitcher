    <text x="150" y="400" font-size="128" text-anchor="middle">ก</text>
    <text x="362" y="400" font-size="128" text-anchor="middle">A</text>
  </g>
  <g stroke="#f6f1e6" stroke-width="12" stroke-linecap="round" fill="none" opacity="0.92">
    <path d="M 226 352 h 60 M 226 352 l 16 -16 M 226 352 l 16 16"/>
    <path d="M 286 380 h -60 M 286 380 l -16 -16 M 286 380 l -16 16"/>
